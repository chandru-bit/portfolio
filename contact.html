<body class="dark">

  <main class="container">
    <section class="contact">
      <h1>Contact</h1>
      <p>Reach out via the form or through any of the links below.</p>
      <form id="contact-form" class="contact-form glass" novalidate>
        <label for="name">Name</label>
        <input id="name" name="name" required>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
        <button class="btn btn-primary" type="submit">Send</button>
      </form>
      <div class="contact-info glass" style="margin-top:1rem">
        <h2>Contact Details</h2>
        <p><strong>Phone:</strong> <a href="tel:+916381110893">+91 6381110893</a></p>
        <p><strong>Email:</strong> <a href="mailto:narmathaanbu2007@gmail.com">narmathaanbu2007@gmail.com</a></p>
        <p><strong>LinkedIn:</strong> <a href="https://www.linkedin.com/in/narmatha-anbu" target="_blank" rel="noreferrer">linkedin.com/in/narmatha-anbu</a></p>
      </div>
    </section>
  </main>
  <footer class="site-footer"><div class="container">© <span id="year"></span> Narmatha A</div></footer>
