<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — Chan S</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script defer src="js/animations.js"></script>
  <script defer src="js/script.js"></script>
</head>
<body class="dark">
  <header class="site-header"><nav class="nav container"><a class="brand" href="index.html">Chan S</a></nav></header>
  <main class="container">
    <section class="contact">
      <h1>Contact</h1>
      <p>Feel free to reach out via the form or email.</p>
      <form id="contact-form" class="contact-form glass" novalidate>
        <label for="name">Name</label>
        <input id="name" name="name" required>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
        <button class="btn btn-primary" type="submit">Send</button>
      </form>
    </section>
  </main>
  <footer class="site-footer"><div class="container">© <span id="year"></span> Chan S</div></footer>
</body>
</html>
